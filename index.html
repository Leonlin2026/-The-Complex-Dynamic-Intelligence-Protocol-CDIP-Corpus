<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KUT — Kähler Unified Transformer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
body{font-family:system-ui,-apple-system,sans-serif}
#gl{display:block;position:fixed;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.hero{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;opacity:0;animation:fadeUp 3s ease 1s forwards}
.hero h1{font-size:clamp(28px,6vw,72px);font-weight:200;color:#fff;letter-spacing:clamp(4px,1.5vw,20px);text-transform:uppercase;line-height:1.1;text-shadow:0 0 80px rgba(100,60,255,0.4)}
.hero .k{font-weight:600;background:linear-gradient(135deg,#a78bfa,#60f0c8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero .eq{font:300 clamp(13px,2.2vw,26px) system-ui;color:rgba(167,139,250,0.8);margin-top:12px;letter-spacing:clamp(2px,0.5vw,6px)}
.hero .sub{font:300 clamp(9px,1vw,14px) system-ui;color:rgba(255,255,255,0.25);margin-top:16px;letter-spacing:clamp(2px,0.8vw,8px);text-transform:uppercase}
.line{width:clamp(40px,8vw,120px);height:1px;background:linear-gradient(90deg,transparent,rgba(167,139,250,0.5),transparent);margin:20px auto 0}
.stats{position:absolute;bottom:clamp(16px,3vh,40px);left:0;right:0;display:flex;justify-content:center;gap:clamp(2px,0.5vw,8px);flex-wrap:wrap;padding:0 8px;opacity:0;animation:fadeUp 2s ease 2.5s forwards}
.st{border:0.5px solid rgba(255,255,255,0.05);border-radius:8px;padding:clamp(6px,1vh,12px) clamp(10px,1.5vw,20px);text-align:center;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);background:rgba(255,255,255,0.02)}
.sv{display:block;font-weight:600;font-size:clamp(13px,1.8vw,22px);background:linear-gradient(135deg,#c4b5fd,#6ee7b7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sl{display:block;font-size:clamp(7px,0.8vw,10px);color:rgba(255,255,255,0.2);margin-top:2px;letter-spacing:1.5px;text-transform:uppercase}
.corner{position:absolute;font:10px system-ui;color:rgba(255,255,255,0.1);letter-spacing:2px}
.corner.bl{bottom:8px;left:16px}
.corner.br{bottom:8px;right:16px}
.corner a{color:rgba(167,139,250,0.3);text-decoration:none}
@keyframes fadeUp{from{opacity:0;transform:translate(-50%,-48%)}to{opacity:1;transform:translate(-50%,-50%)}}
</style>
</head>
<body>
<canvas id="gl"></canvas>
<div id="ui">
<div class="hero">
<h1><span class="k">Kähler</span> Unified<br>Transformer</h1>
<div class="eq">K(z, z̄) = (α/2)|z|⁴ + β|z|²</div>
<div class="line"></div>
<div class="sub">A language model derived from a single geometric potential</div>
</div>
<div class="stats">
<div class="st"><span class="sv">578M</span><span class="sl">Parameters</span></div>
<div class="st"><span class="sv">384</span><span class="sl">Geometric scalars</span></div>
<div class="st"><span class="sv">α×13</span><span class="sl">Curvature growth</span></div>
<div class="st"><span class="sv">ℏω=π</span><span class="sl">Bohr–Sommerfeld</span></div>
<div class="st"><span class="sv">PPL 43</span><span class="sl">450M tokens</span></div>
</div>
<div class="corner bl"><a href="https://github.com/Leonlin2026/-The-Complex-Dynamic-Intelligence-Protocol-CDIP-Corpus">GITHUB · LEONLIN2026</a></div>
<div class="corner br">THE WALLFACER PROJECT · JIAN LIN · 2026</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
window.addEventListener('load', function() {
  var cv = document.getElementById('gl');
  var W = window.innerWidth;
  var H = window.innerHeight;

  var scene = new THREE.Scene();
  var cam = new THREE.PerspectiveCamera(45, W / H, 0.1, 500);
  var renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;
  renderer.setClearColor(0x000000, 1);

  window.addEventListener('resize', function() {
    W = window.innerWidth; H = window.innerHeight;
    cam.aspect = W / H; cam.updateProjectionMatrix();
    renderer.setSize(W, H);
  });

  var AA = 0.5, BB = 0.7, VS = 1.0, vR = Math.sqrt(VS);
  function KF(r) { return (AA/2)*r*r + BB*r; }
  function GF(r) { return 2*AA*r + BB; }
  var ringY = KF(VS) * 0.1;

  // Stars
  [2000,800,300].forEach(function(n, layer) {
    var g = new THREE.BufferGeometry();
    var p = new Float32Array(n*3), c = new Float32Array(n*3);
    for (var i = 0; i < n; i++) {
      var theta = Math.random()*Math.PI*2, phi = Math.acos(2*Math.random()-1);
      var r = [80,40,20][layer];
      p[i*3] = r*Math.sin(phi)*Math.cos(theta);
      p[i*3+1] = r*Math.sin(phi)*Math.sin(theta);
      p[i*3+2] = r*Math.cos(phi);
      var b = 0.3 + Math.random()*0.7;
      c[i*3] = b*(0.8+Math.random()*0.2);
      c[i*3+1] = b*(0.7+Math.random()*0.3);
      c[i*3+2] = b;
    }
    g.setAttribute('position', new THREE.Float32BufferAttribute(p, 3));
    g.setAttribute('color', new THREE.Float32BufferAttribute(c, 3));
    scene.add(new THREE.Points(g, new THREE.PointsMaterial({
      size: [0.08,0.15,0.3][layer], vertexColors: true, transparent: true,
      opacity: [0.3,0.5,0.8][layer], sizeAttenuation: true, depthWrite: false
    })));
  });

  // Nebula
  for (var i = 0; i < 6; i++) {
    var nm = new THREE.Mesh(
      new THREE.SphereGeometry(8+Math.random()*12, 8, 8),
      new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(0.72+Math.random()*0.15, 0.6, 0.08), transparent: true, opacity: 0.03, depthWrite: false })
    );
    nm.position.set((Math.random()-0.5)*30, (Math.random()-0.5)*20, (Math.random()-0.5)*30 - 10);
    nm.scale.set(1+Math.random(), 0.5+Math.random()*0.5, 1+Math.random());
    scene.add(nm);
  }

  // Surface
  var RES = 120, MR = 5;
  var sg = new THREE.BufferGeometry();
  var sv = [], sc2 = [], si = [];
  for (var i = 0; i <= RES; i++) {
    for (var j = 0; j <= RES; j++) {
      var r = i/RES*MR, th = j/RES*Math.PI*2;
      sv.push(r*Math.cos(th), KF(r)*0.1, r*Math.sin(th));
      var rat = GF(r)/GF(VS), nv = Math.exp(-(r-vR)*(r-vR)*6);
      sc2.push(0.02+nv*0.25+Math.max(0,(rat-1)*0.06), 0.005+nv*0.7, 0.04+nv*0.4+Math.min(rat*0.12,0.35));
      if (i < RES && j < RES) {
        var a = i*(RES+1)+j, b2 = a+1, c3 = (i+1)*(RES+1)+j, d = c3+1;
        si.push(a, c3, b2, b2, c3, d);
      }
    }
  }
  sg.setAttribute('position', new THREE.Float32BufferAttribute(sv, 3));
  sg.setAttribute('color', new THREE.Float32BufferAttribute(sc2, 3));
  sg.setIndex(si); sg.computeVertexNormals();
  scene.add(new THREE.Mesh(sg, new THREE.MeshPhongMaterial({
    vertexColors: true, transparent: true, opacity: 0.45, side: THREE.DoubleSide,
    shininess: 120, specular: new THREE.Color(0x6050d0)
  })));
  scene.add(new THREE.Mesh(sg.clone(), new THREE.MeshBasicMaterial({
    vertexColors: true, wireframe: true, transparent: true, opacity: 0.04
  })));

  // Vacuum ring + glow
  var ringMesh = new THREE.Mesh(
    new THREE.TorusGeometry(vR, 0.008, 16, 200),
    new THREE.MeshBasicMaterial({ color: 0x60f0c8 })
  );
  ringMesh.rotation.x = Math.PI/2; ringMesh.position.y = ringY;
  scene.add(ringMesh);

  [0.03, 0.08, 0.2, 0.5, 1.0, 2.0].forEach(function(s, idx) {
    var gm = new THREE.Mesh(
      new THREE.TorusGeometry(vR, s, 8, 120),
      new THREE.MeshBasicMaterial({
        color: idx < 3 ? 0x60f0c8 : 0x4080ff, transparent: true,
        opacity: [0.2, 0.08, 0.03, 0.015, 0.008, 0.003][idx],
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    );
    gm.rotation.x = Math.PI/2; gm.position.y = ringY; scene.add(gm);
  });

  // Disk
  var disk = new THREE.Mesh(
    new THREE.RingGeometry(vR*0.6, vR*1.8, 120),
    new THREE.MeshBasicMaterial({ color: 0x4030a0, transparent: true, opacity: 0.04, side: THREE.DoubleSide, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  disk.rotation.x = Math.PI/2; disk.position.y = ringY; scene.add(disk);

  // 5000 particles
  var PC = 5000;
  var pg2 = new THREE.BufferGeometry();
  var pp2 = new Float32Array(PC*3), pcol2 = new Float32Array(PC*3), pd2 = [];
  for (var i = 0; i < PC; i++) {
    var r = 0.02 + Math.random()*4.5, a = Math.random()*Math.PI*2;
    pd2.push({ r:r, a:a, sp:(0.0002+Math.random()*0.004)*(Math.random()>0.5?1:-1), yo:(Math.random()-0.5)*0.15, ph:Math.random()*Math.PI*2 });
    var near = Math.abs(r - vR) < 0.4;
    pcol2[i*3] = near ? 0.35 : 0.7+Math.random()*0.3;
    pcol2[i*3+1] = near ? 0.85+Math.random()*0.15 : 0.2+Math.random()*0.2;
    pcol2[i*3+2] = near ? 0.7 : 0.15;
  }
  pg2.setAttribute('position', new THREE.Float32BufferAttribute(pp2, 3));
  pg2.setAttribute('color', new THREE.Float32BufferAttribute(pcol2, 3));
  scene.add(new THREE.Points(pg2, new THREE.PointsMaterial({
    size: 0.02, vertexColors: true, transparent: true, opacity: 0.65,
    sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
  })));

  // 500 bright vacuum particles
  var BPC = 500;
  var bg3 = new THREE.BufferGeometry();
  var bp2 = new Float32Array(BPC*3), bc2 = new Float32Array(BPC*3), bd2 = [];
  for (var i = 0; i < BPC; i++) {
    var r = vR + (Math.random()-0.5)*0.3, a = Math.random()*Math.PI*2;
    bd2.push({ r:r, a:a, sp:(0.002+Math.random()*0.006)*(Math.random()>0.5?1:-1), ph:Math.random()*Math.PI*2 });
    bc2[i*3] = 0.4+Math.random()*0.2; bc2[i*3+1] = 0.9+Math.random()*0.1; bc2[i*3+2] = 0.75;
  }
  bg3.setAttribute('position', new THREE.Float32BufferAttribute(bp2, 3));
  bg3.setAttribute('color', new THREE.Float32BufferAttribute(bc2, 3));
  scene.add(new THREE.Points(bg3, new THREE.PointsMaterial({
    size: 0.04, vertexColors: true, transparent: true, opacity: 0.9,
    sizeAttenuation: true, blending: THREE.AdditiveBlending, depthWrite: false
  })));

  // Beams
  var beams = [];
  for (var i = 0; i < 32; i++) {
    var ba = i/32*Math.PI*2;
    var bMesh = new THREE.Mesh(
      new THREE.CylinderGeometry(0.003, 0.0005, 4, 3),
      new THREE.MeshBasicMaterial({ color: 0x7060ff, transparent: true, opacity: 0.06, blending: THREE.AdditiveBlending, depthWrite: false })
    );
    bMesh.position.set(vR*Math.cos(ba), ringY+2, vR*Math.sin(ba));
    scene.add(bMesh); beams.push({ mesh: bMesh, a: ba });
  }

  // Geodesics
  for (var i = 0; i < 8; i++) {
    var pts = [], fr = 0.5 + i*0.5;
    for (var j = 0; j <= 200; j++) {
      var th = j/200*Math.PI*2;
      pts.push(new THREE.Vector3(fr*Math.cos(th), KF(fr)*0.1+0.005, fr*Math.sin(th)));
    }
    scene.add(new THREE.Line(
      new THREE.BufferGeometry().setFromPoints(pts),
      new THREE.LineBasicMaterial({
        color: Math.abs(fr-vR)<0.3 ? 0x60f0c8 : 0x4030a0,
        transparent: true, opacity: Math.abs(fr-vR)<0.3 ? 0.15 : 0.04,
        blending: THREE.AdditiveBlending, depthWrite: false
      })
    ));
  }

  // Lights
  scene.add(new THREE.AmbientLight(0x0a0820, 0.4));
  var L1 = new THREE.PointLight(0x7060ff, 3, 30); L1.position.set(0, 8, 0); scene.add(L1);
  var L2 = new THREE.PointLight(0x60f0c8, 2.5, 20); L2.position.set(0, ringY, 0); scene.add(L2);
  var L3 = new THREE.PointLight(0xff5030, 0.3, 15); L3.position.set(5, 3, -5); scene.add(L3);
  var L4 = new THREE.PointLight(0x3040ff, 0.4, 15); L4.position.set(-5, 2, 5); scene.add(L4);

  // Interaction
  var time = 0, dX = 0, dY = 0, drag = false;
  document.addEventListener('mousedown', function() { drag = true; document.body.style.cursor = 'grabbing'; });
  document.addEventListener('mouseup', function() { drag = false; document.body.style.cursor = 'default'; });
  document.addEventListener('mousemove', function(e) {
    if (drag) { dX += e.movementX*0.002; dY = Math.max(-0.4, Math.min(0.4, dY + e.movementY*0.002)); }
  });

  function loop() {
    time += 0.0015;
    var phase = time*0.08 + dX;
    var camR = 7 + Math.sin(time*0.15)*1.5;
    var camH = 3.2 + dY*4 + Math.sin(time*0.2)*0.8;
    cam.position.set(Math.sin(phase)*camR, camH, Math.cos(phase)*camR);
    cam.lookAt(0, ringY*0.5 + Math.sin(time*0.3)*0.2, 0);

    for (var i = 0; i < PC; i++) {
      var d = pd2[i]; d.a += d.sp;
      pp2[i*3] = d.r*Math.cos(d.a);
      pp2[i*3+1] = KF(d.r)*0.1 + d.yo + Math.sin(time*3+d.ph)*0.01;
      pp2[i*3+2] = d.r*Math.sin(d.a);
    }
    pg2.attributes.position.needsUpdate = true;

    for (var i = 0; i < BPC; i++) {
      var d = bd2[i]; d.a += d.sp;
      bp2[i*3] = d.r*Math.cos(d.a);
      bp2[i*3+1] = ringY + Math.sin(time*5+d.ph)*0.03;
      bp2[i*3+2] = d.r*Math.sin(d.a);
    }
    bg3.attributes.position.needsUpdate = true;

    ringMesh.material.opacity = 0.8 + 0.2*Math.sin(time*3);
    L2.intensity = 2 + Math.sin(time*2)*1;
    beams.forEach(function(b) {
      var p = 0.5 + 0.5*Math.sin(time*4 + b.a*4);
      b.mesh.material.opacity = 0.06*p; b.mesh.scale.y = 0.3 + p;
    });
    disk.rotation.z = time*0.3;

    renderer.render(scene, cam);
    requestAnimationFrame(loop);
  }
  loop();
});
</script>
</body>
</html>
