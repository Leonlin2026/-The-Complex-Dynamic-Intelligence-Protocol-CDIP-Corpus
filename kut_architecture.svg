<svg width="100%" viewBox="0 0 680 920" xmlns="http://www.w3.org/2000/svg" style="font-family: system-ui, -apple-system, sans-serif; background: white;">
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- Title -->
<rect x="160" y="30" width="360" height="56" rx="12" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="340" y="50" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">K(z, z̄) = (α/2)|z|⁴ + β|z|²</text>
<text x="340" y="70" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#534AB7">Single Kähler potential — 384 scalars</text>

<!-- Arrows from K -->
<line x1="205" y1="86" x2="115" y2="130" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="280" y1="86" x2="260" y2="130" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="400" y1="86" x2="420" y2="130" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<line x1="475" y1="86" x2="565" y2="130" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Geometry -->
<rect x="40" y="132" width="150" height="100" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="115" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Geometry</text>
<text x="115" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">g = 2αr + β</text>
<text x="115" y="189" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">Γ = 2α / g</text>
<text x="115" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">κ = 2αβ / g²</text>

<!-- Probability -->
<rect x="200" y="132" width="130" height="100" rx="8" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.5"/>
<text x="265" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#0C447C">Probability</text>
<text x="265" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">ℏ = π / ω</text>
<text x="265" y="189" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">m = √(g/g_vac)</text>
<text x="265" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#185FA5">ω = √(g_vac/v²)</text>

<!-- Physics -->
<rect x="350" y="132" width="140" height="100" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="420" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Physics</text>
<text x="420" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">F_SSB = -κ(r-v²)z</text>
<text x="420" y="189" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">F_Calabi = -ω(κ-κ̄)z</text>
<text x="420" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">dt = 1/(Lω)</text>

<!-- Information -->
<rect x="500" y="132" width="140" height="100" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="570" y="152" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Information</text>
<text x="570" y="172" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Ψ = m·R(θ)·h</text>
<text x="570" y="189" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">logits = ⟨Φ,Ψ⟩/ℏ</text>
<text x="570" y="206" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">loss = CE + anchor</text>

<!-- Bracket -->
<path d="M115 234 L115 248 L265 248 L265 234" fill="none" stroke="#888" stroke-width="0.5"/>
<text x="190" y="262" text-anchor="middle" font-size="12" fill="#888">Two faces of K</text>
<line x1="190" y1="268" x2="190" y2="280" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<text x="340" y="292" text-anchor="middle" font-size="12" fill="#888">↓ Forces + dynamics → Section measurement ↓</text>

<!-- Layer container -->
<rect x="40" y="320" width="600" height="430" rx="16" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="340" y="344" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">One KUT layer (×28)</text>

<!-- Kähler Attention -->
<rect x="70" y="365" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="195" y="383" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Kähler attention</text>
<text x="195" y="403" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">score = (π/ℏ)·⟨R(Γ)q, k⟩/√d</text>

<rect x="340" y="369" width="100" height="28" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="390" y="387" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Lock 1: Γ</text>
<text x="500" y="387" font-size="12" fill="#0F6E56">FlashAttention ✓</text>

<!-- Transport -->
<line x1="195" y1="421" x2="195" y2="440" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="70" y="442" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="195" y="460" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Parallel transport</text>
<text x="195" y="480" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">h ← exp(-Γ·dt)·h + Δh</text>

<!-- Field evolution -->
<line x1="195" y1="498" x2="195" y2="515" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="70" y="517" width="250" height="56" rx="8" fill="#FAECE7" stroke="#993C1D" stroke-width="0.5"/>
<text x="195" y="535" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#712B13">Field evolution</text>
<text x="195" y="555" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#993C1D">s, θ += dt·(SSB + Calabi)</text>
<text x="390" y="545" font-size="12" fill="#993C1D">Forces from K</text>

<!-- Covariant MLP -->
<line x1="195" y1="573" x2="195" y2="590" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="70" y="592" width="250" height="56" rx="8" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="195" y="610" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Covariant MLP</text>
<text x="195" y="630" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#0F6E56">x·√g → MLP → out/√g</text>

<rect x="340" y="600" width="100" height="28" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="390" y="618" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Lock 2: g</text>

<!-- Section readout -->
<line x1="195" y1="648" x2="195" y2="680" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>
<rect x="70" y="682" width="250" height="56" rx="8" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.5"/>
<text x="195" y="700" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#633806">Section readout</text>
<text x="195" y="720" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#854F0B">Ψ = √(g/g_vac)·R(θ)·proj(h)</text>

<rect x="340" y="690" width="130" height="28" rx="14" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="405" y="708" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#3C3489">Lock 3: g, ℏ</text>

<!-- Logits -->
<line x1="195" y1="738" x2="195" y2="768" stroke="#888" stroke-width="0.5" marker-end="url(#arrow)"/>

<!-- Loss -->
<rect x="100" y="770" width="280" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="240" y="796" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">loss = CE + (log ω̄/ω*)²</text>

<!-- Feedback arrow -->
<path d="M380 792 Q610 792, 610 58 Q610 30, 520 58" fill="none" stroke="#7F77DD" stroke-width="1" stroke-dasharray="4 3" marker-end="url(#arrow)"/>
<text x="622" y="420" text-anchor="start" font-size="11" fill="#7F77DD" transform="rotate(90, 622, 420)">CE gradient → α, β, v²</text>

<!-- Flat limit -->
<rect x="430" y="842" width="200" height="44" rx="8" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="0.5"/>
<text x="530" y="856" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#444441">Flat limit: α → 0</text>
<text x="530" y="876" text-anchor="middle" dominant-baseline="central" font-size="12" fill="#5F5E5A">= standard Transformer</text>

</svg>
